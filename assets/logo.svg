<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 200" width="600" height="200">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fdf2f8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fce7f3;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="heartGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#f472b6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="heart2Grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#fb923c;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f97316;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="bodyGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fdba74;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#fb923c;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="earGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#fbbf24;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background pill -->
  <rect x="0" y="0" width="600" height="200" rx="24" ry="24" fill="url(#bgGrad)" stroke="#f9a8d4" stroke-width="2"/>

  <!-- === Cute Red Panda (left side) === -->
  <g transform="translate(85, 100)">
    <!-- Tail -->
    <path d="M 30 20 Q 55 45, 50 15 Q 48 -5, 38 5" fill="url(#bodyGrad)" stroke="#ea580c" stroke-width="1.5" fill-opacity="0.8"/>
    <path d="M 45 18 Q 50 10, 46 8" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>
    <path d="M 42 25 Q 48 18, 44 14" fill="none" stroke="#fff" stroke-width="1.5" stroke-linecap="round" opacity="0.5"/>

    <!-- Body -->
    <ellipse cx="0" cy="25" rx="28" ry="22" fill="url(#bodyGrad)" stroke="#ea580c" stroke-width="1.5"/>
    <!-- Belly -->
    <ellipse cx="0" cy="30" rx="16" ry="13" fill="#fef3c7" opacity="0.9"/>

    <!-- Head -->
    <circle cx="0" cy="-12" r="32" fill="url(#bodyGrad)" stroke="#ea580c" stroke-width="1.5"/>

    <!-- Ears -->
    <ellipse cx="-24" cy="-38" rx="12" ry="14" fill="url(#earGrad)" stroke="#ea580c" stroke-width="1.5"/>
    <ellipse cx="24" cy="-38" rx="12" ry="14" fill="url(#earGrad)" stroke="#ea580c" stroke-width="1.5"/>
    <!-- Inner ears -->
    <ellipse cx="-24" cy="-36" rx="7" ry="9" fill="#fef3c7" opacity="0.8"/>
    <ellipse cx="24" cy="-36" rx="7" ry="9" fill="#fef3c7" opacity="0.8"/>

    <!-- Face mask (white patches) -->
    <ellipse cx="-12" cy="-12" rx="11" ry="9" fill="#fef3c7" opacity="0.85"/>
    <ellipse cx="12" cy="-12" rx="11" ry="9" fill="#fef3c7" opacity="0.85"/>

    <!-- Eyes -->
    <circle cx="-11" cy="-14" r="5.5" fill="#1e293b"/>
    <circle cx="11" cy="-14" r="5.5" fill="#1e293b"/>
    <!-- Eye shine -->
    <circle cx="-9" cy="-16" r="2" fill="#fff"/>
    <circle cx="13" cy="-16" r="2" fill="#fff"/>
    <!-- Eye lower shine -->
    <circle cx="-12" cy="-12" r="1" fill="#fff" opacity="0.5"/>
    <circle cx="10" cy="-12" r="1" fill="#fff" opacity="0.5"/>

    <!-- Nose -->
    <ellipse cx="0" cy="-4" rx="4" ry="3" fill="#1e293b"/>
    <ellipse cx="0" cy="-5" rx="1.5" ry="1" fill="#fff" opacity="0.4"/>

    <!-- Mouth -->
    <path d="M -4 -1 Q 0 4, 4 -1" fill="none" stroke="#1e293b" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Cheek blush -->
    <ellipse cx="-18" cy="-6" rx="5" ry="3.5" fill="#f9a8d4" opacity="0.5"/>
    <ellipse cx="18" cy="-6" rx="5" ry="3.5" fill="#f9a8d4" opacity="0.5"/>

    <!-- Paws -->
    <ellipse cx="-14" cy="44" rx="8" ry="5" fill="url(#bodyGrad)" stroke="#ea580c" stroke-width="1.2"/>
    <ellipse cx="14" cy="44" rx="8" ry="5" fill="url(#bodyGrad)" stroke="#ea580c" stroke-width="1.2"/>

    <!-- Floating heart above head -->
    <g transform="translate(0, -62) scale(0.6)">
      <path d="M 0 8 C 0 8, -12 -4, -12 -10 C -12 -16, -6 -20, 0 -14 C 6 -20, 12 -16, 12 -10 C 12 -4, 0 8, 0 8 Z" fill="url(#heartGrad)"/>
    </g>
  </g>

  <!-- === Small floating hearts === -->
  <g opacity="0.6">
    <g transform="translate(48, 30) scale(0.35)">
      <path d="M 0 8 C 0 8, -12 -4, -12 -10 C -12 -16, -6 -20, 0 -14 C 6 -20, 12 -16, 12 -10 C 12 -4, 0 8, 0 8 Z" fill="#f9a8d4"/>
    </g>
    <g transform="translate(140, 22) scale(0.3)">
      <path d="M 0 8 C 0 8, -12 -4, -12 -10 C -12 -16, -6 -20, 0 -14 C 6 -20, 12 -16, 12 -10 C 12 -4, 0 8, 0 8 Z" fill="#fbbf24"/>
    </g>
    <g transform="translate(540, 35) scale(0.4)">
      <path d="M 0 8 C 0 8, -12 -4, -12 -10 C -12 -16, -6 -20, 0 -14 C 6 -20, 12 -16, 12 -10 C 12 -4, 0 8, 0 8 Z" fill="url(#heartGrad)"/>
    </g>
    <g transform="translate(560, 160) scale(0.3)">
      <path d="M 0 8 C 0 8, -12 -4, -12 -10 C -12 -16, -6 -20, 0 -14 C 6 -20, 12 -16, 12 -10 C 12 -4, 0 8, 0 8 Z" fill="#fbbf24"/>
    </g>
    <g transform="translate(30, 160) scale(0.25)">
      <path d="M 0 8 C 0 8, -12 -4, -12 -10 C -12 -16, -6 -20, 0 -14 C 6 -20, 12 -16, 12 -10 C 12 -4, 0 8, 0 8 Z" fill="#f9a8d4"/>
    </g>
  </g>

  <!-- === Text (right side) === -->
  <g transform="translate(370, 72)">
    <!-- Main title -->
    <text x="0" y="0" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="bold" fill="#9d174d" text-anchor="middle">Suhird</text>
    <!-- Sanskrit -->
    <text x="0" y="30" font-family="Georgia, 'Times New Roman', serif" font-size="20" fill="#be185d" text-anchor="middle" opacity="0.8">8A9C&M</text>
    <!-- Tagline -->
    <text x="0" y="62" font-family="'Segoe UI', Arial, sans-serif" font-size="13" fill="#6b7280" text-anchor="middle" letter-spacing="1">A good-hearted friend</text>

    <!-- Divider line -->
    <line x1="-80" y1="74" x2="80" y2="74" stroke="#f9a8d4" stroke-width="1.5" stroke-linecap="round"/>

    <!-- Subtitle -->
    <text x="0" y="94" font-family="'Segoe UI', Arial, sans-serif" font-size="11.5" fill="#9ca3af" text-anchor="middle" letter-spacing="0.5">WhatsApp Matchmaking Platform</text>
  </g>

  <!-- Small heart accent between mascot and text -->
  <g transform="translate(200, 95) scale(0.5)">
    <path d="M 0 8 C 0 8, -12 -4, -12 -10 C -12 -16, -6 -20, 0 -14 C 6 -20, 12 -16, 12 -10 C 12 -4, 0 8, 0 8 Z" fill="url(#heart2Grad)" opacity="0.7"/>
  </g>
</svg>
