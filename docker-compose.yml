version: "3.9"

services:
  postgres:
    image: postgres:16-alpine
    container_name: suhird-postgres
    ports:
      - "5433:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-suhird}
      POSTGRES_USER: ${POSTGRES_USER:-suhird_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-suhird_pass_2024}
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-suhird_user} -d ${POSTGRES_DB:-suhird}"]
      interval: 5s
      timeout: 5s
      retries: 5

  qdrant:
    image: qdrant/qdrant:latest
    container_name: suhird-qdrant
    ports:
      - "6335:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:6333/healthz || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: suhird-redis
    ports:
      - "6380:6379"
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  mempalace:
    build:
      context: ./mempalace_service
      dockerfile: Dockerfile
    container_name: suhird-mempalace
    ports:
      - "8001:8001"
    volumes:
      - mempalace_data:/app/data
    environment:
      MEMPALACE_DATA_DIR: /app/data
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8001/health || exit 1"]
      interval: 5s
      timeout: 5s
      retries: 5

  suhird:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: suhird-bot
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./photos:/app/photos
      - ./logs:/app/logs
    depends_on:
      postgres:
        condition: service_healthy
      qdrant:
        condition: service_healthy
      redis:
        condition: service_healthy
      mempalace:
        condition: service_healthy

volumes:
  postgres_data:
  qdrant_data:
  redis_data:
  mempalace_data:
